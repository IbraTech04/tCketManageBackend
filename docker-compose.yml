# PostgreSQL-backed stack for load/stress testing the tCketManage backend.
#
#   docker compose up --build
#
# App is served on http://localhost:8080 (Swagger UI at /swagger-ui.html).
# Then drive load with:  python scripts/stress_test.py
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tcketmanage
      POSTGRES_USER: tcket
      POSTGRES_PASSWORD: tcket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcket -d tcketmanage"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/tcketmanage
      DB_USERNAME: tcket
      DB_PASSWORD: tcket
      # Keep email OFF for stress runs (see application-prod.properties).
      APP_EMAIL_ENABLED: "false"
      PAYMENTS_ADMIN_TOKEN: changeme-dev-token
      PAYMENTS_MOCK_AUTOCONFIRM: "true"
      # Pool a bit above the stress client's thread count so the expiry sweep
      # and async email pool aren't starved. Raise to probe pool exhaustion.
      DB_POOL_SIZE: "20"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  pgdata:
