spring.application.name=tCketManageBackend

# --- OpenAPI / Swagger UI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- Database ---
# SQLite by default for zero-setup local dev (a tcketmanage.db file is created on first run).
# Switch to MySQL with: --spring.profiles.active=mysql  (see application-mysql.properties)
spring.datasource.url=jdbc:sqlite:tcketmanage.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# --- Payments ---
# Which provider an order uses when none is specified in the request.
payments.default-provider=mock
# Shared secret for operator endpoints (manual confirm / mock complete). CHANGE PER DEPLOYMENT.
payments.admin-token=changeme-dev-token
# Interval (ms) for the expired-order sweep.
payments.sweep-interval-ms=60000

# Mock provider: enabled by default for dev/tests. auto-confirm settles orders immediately.
payments.mock.enabled=true
payments.mock.auto-confirm=true
payments.mock.hold-minutes=30

# Stripe: stub only for now. Enable + configure to activate (real impl deferred).
payments.stripe.enabled=false

# Interac e-Transfer (manual reference-code flow). Enable + set payee email to activate.
payments.interac.enabled=false
payments.interac.payee-email=
payments.interac.hold-hours=48
